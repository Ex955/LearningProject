<script src="js/bootstrap.bundle.min.js"></script>
<script src="js/jquery-4.0.0.js"></script>
<script>
    $(function () {
        $.ajax({
            type: "GET",
            url: "http://localhost:3000/TravelFood/",
            dataType: "json",
            success: function (data) {
                console.log(data);
                const cleanData = data.map(function (item, index) {
                    //餐廳圖片
                    let img = (item.PicURL ?? "").trim();
                    if (img == "") {
                        img = "img/Fish.jpg";
                    }
                    //餐廳名稱
                    let name = (item.Name ?? "").trim();
                    if (name == "") {
                        name = "未提供名稱"
                    }
                    //餐廳地址
                    let address = (item.address ?? "").trim()
                        + (item.City ?? "").trim()
                        + (item.Town ?? "").trim();
                    if (address == "") {
                        address = "未提供地址"
                    }
                    //餐廳電話
                    let tel = (item.Tel ?? "").trim();
                    if (tel == "") {
                        tel = "未提供電話"
                    }
                    //餐廳簡介
                    let description = (item.HostWords ?? "").trim();
                    if (description == "") {
                        description = "未提供簡介"
                    }
                    //超連結
                    let link = (item.Url ?? "").trim();
                    if (link == "") {
                        link = "未提供超連結"
                    }

                    return {
                        img: img,
                        name: name,
                        address: address,
                        tel: tel,
                        description: description,
                        link: link
                    }

                });
                //1.清洗資料，保留需要的欄位
                //2.將清洗後的資料渲染至AI產生的contentBox
                $("#RestaurantRow").empty();   // 清空舊內容

                cleanData.forEach(function (item) {

                    let card =`
                        <div class="col-md-6 col-lg-4">
                            <div class="section02 roller-l text-center">

                                <div class="roller_box">
                                    <a href="${item.link}" class="btn btn-success">查看餐廳</a>
                                </div>

                                <img src="${item.img}" class="img-fluid rounded mb-3" alt="餐廳圖片">

                                    <h3 class="fw-bold">${item.name}</h3>

                                    <p class="text-muted mb-1">
                                        <i class="bi bi-geo-alt-fill"></i> ${item.address}
                                    </p>

                                    <p class="text-muted mb-3">
                                        <i class="bi bi-telephone-fill"></i> ${item.tel}
                                    </p>

                                    <p class="fw-500">${item.description}</p>

                            </div>
                        </div>
    `;

                    $("#RestaurantRow").append(card);
                });
            },
            error: function (err) {
                console.log(err);
            }
        });
    })
</script>
